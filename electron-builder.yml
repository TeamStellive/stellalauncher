appId: stellalauncher
productName: Stella Launcher
artifactName: StellaLauncher-Setup-${version}.${ext}

copyright: Copyright © 2018-2026 Daniel Scalzi

asar: true
compression: maximum

files:
  - "!{dist,.gitignore,.vscode,docs,dev-app-update.yml,.nvmrc,eslint.config.mjs}"

extraResources:
  - libraries

publish: null

win:
  target:
    - target: portable
      arch:
        - x64

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  artifactName: StellaLauncher-Setup-${version}-${arch}.${ext}
  category: public.app-category.games

linux:
  target:
    - target: AppImage
      arch:
        - x64
  artifactName: StellaLauncher-${version}-${arch}.${ext}
  maintainer: TeamStellive
  vendor: TeamStellive
  synopsis: Modded Minecraft Launcher
  description: Custom launcher which allows users to join modded servers. All mods, configurations, and updates are handled automatically.
  category: Game

directories:
  buildResources: build
  output: dist